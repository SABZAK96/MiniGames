<!doctype html>
<html id="page" lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokéWordle</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link href="css/theme.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.js"></script>
    <style>
      .cell {
        transition: background-color 0.3s ease;
      }
      .silhouette {
        filter: brightness(0);
      }
      /* [data-theme="dark"] is an attribute selector  */
      /* find .silhouette that is inside an element where data-theme="dark" and make it white */
      [data-theme="dark"] .silhouette {
        filter: brightness(0) invert(1);
      }
      .shakeDiv {
        animation: shake 0.5s linear 0s;
      }
      @keyframes shake {
        0% {
          transform: translateX(0);
        }
        15% {
          transform: translateX(-8px);
        }
        30% {
          transform: translateX(8px);
        }
        45% {
          transform: translateX(-8px);
        }
        60% {
          transform: translateX(8px);
        }
        75% {
          transform: translateX(-4px);
        }
        90% {
          transform: translateX(4px);
        }
        100% {
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <!-- navbar -->
    <div class="navbar bg-base-200 px-4 shadow-sm">
      <div class="navbar-start">
        <a href="index.html"
          ><img class="md:w-30 w-20" src="./images/logo.png" alt=""
        /></a>
      </div>
      <div class="navbar-center">
        <span class="md:text-xl text-lg font-bold">Poké Wordle</span>
      </div>
      <div class="navbar-end">
        <label class="flex cursor-pointer gap-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 md:w-4 md:h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5" />
            <path
              d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"
            />
          </svg>
          <input type="checkbox" class="toggle theme-controller" />
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 md:w-4 md:h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </label>
      </div>
    </div>

    <!-- mobile nav -->
    <div class="dock fixed bottom-0 left-0 z-50 rounded-full md:hidden visible mb-2 bg-base-200">
      <a href="index.html">
        <svg class="size-8" viewBox="0 0 52 40" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="18" r="18" fill="#cc2222"/>
          <rect x="8" y="15" width="36" height="6" fill="#111111"/>
          <path d="M8 18 A18 18 0 0 0 44 18 Z" fill="#ffffff"/>
          <rect x="8" y="15" width="36" height="6" fill="#111111"/>
          <circle cx="26" cy="18" r="7" fill="#ffffff" stroke="#111111" stroke-width="2"/>
          <circle cx="26" cy="18" r="3" fill="#cc2222"/>
        </svg>
        <span class="dock-label">Home</span>
      </a>

      <a href="pokewordle.html">
        <svg class="size-8" viewBox="0 0 40 38" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="2" width="14" height="14" rx="2.5" fill="#44bb66"/>
          <rect x="22" y="2" width="14" height="14" rx="2.5" fill="#ddaa22"/>
          <rect x="4" y="20" width="14" height="14" rx="2.5" fill="#ddaa22"/>
          <rect x="22" y="20" width="14" height="14" rx="2.5" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
        </svg>
        <span class="dock-label font-bold text-[#cc2222]">Wordle</span>
        <span class="size-1.5 rounded-full bg-[#cc2222]"></span>
      </a>

      <a href="memory.html">
        <svg class="size-8" viewBox="0 0 34 36" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="6" width="20" height="26" rx="4" fill="#cc2222" opacity="0.15" stroke="#cc2222" stroke-width="1.5"/>
          <line x1="0" y1="19" x2="20" y2="19" stroke="#cc2222" stroke-width="1" opacity="0.5"/>
          <circle cx="10" cy="19" r="3.5" fill="white" stroke="#cc2222" stroke-width="1" opacity="0.7"/>
          <rect x="10" y="2" width="20" height="26" rx="4" fill="#cc2222" opacity="0.5" stroke="#cc2222" stroke-width="1.5"/>
          <line x1="10" y1="15" x2="30" y2="15" stroke="#ffffff" stroke-width="1" opacity="0.7"/>
          <circle cx="20" cy="15" r="3.5" fill="white" stroke="#ffffff" stroke-width="1" opacity="0.9"/>
        </svg>
        <span class="dock-label">Memory</span>
      </a>

      <a href="tictactoe.html">
        <svg class="size-8" viewBox="0 0 58 58" xmlns="http://www.w3.org/2000/svg">
          <rect x="18" y="0" width="2" height="58" fill="#111111"/>
          <rect x="38" y="0" width="2" height="58" fill="#111111"/>
          <rect x="0" y="18" width="58" height="2" fill="#111111"/>
          <rect x="0" y="38" width="58" height="2" fill="#111111"/>
          <circle cx="9" cy="9" r="6" fill="#cc2222"/>
          <rect x="3" y="7.5" width="12" height="3" fill="#111111"/>
          <path d="M3 9 A6 6 0 0 0 15 9 Z" fill="#ffffff"/>
          <rect x="3" y="7.5" width="12" height="3" fill="#111111"/>
          <circle cx="9" cy="9" r="2.5" fill="#ffffff" stroke="#111111" stroke-width="0.8"/>
          <circle cx="9" cy="9" r="1" fill="#cc2222"/>
          <circle cx="29" cy="29" r="6" fill="#cc2222"/>
          <rect x="23" y="27.5" width="12" height="3" fill="#111111"/>
          <path d="M23 29 A6 6 0 0 0 35 29 Z" fill="#ffffff"/>
          <rect x="23" y="27.5" width="12" height="3" fill="#111111"/>
          <circle cx="29" cy="29" r="2.5" fill="#ffffff" stroke="#111111" stroke-width="0.8"/>
          <circle cx="29" cy="29" r="1" fill="#cc2222"/>
          <circle cx="49" cy="49" r="6" fill="#cc2222"/>
          <rect x="43" y="47.5" width="12" height="3" fill="#111111"/>
          <path d="M43 49 A6 6 0 0 0 55 49 Z" fill="#ffffff"/>
          <rect x="43" y="47.5" width="12" height="3" fill="#111111"/>
          <circle cx="49" cy="49" r="2.5" fill="#ffffff" stroke="#111111" stroke-width="0.8"/>
          <circle cx="49" cy="49" r="1" fill="#cc2222"/>
        </svg>
        <span class="dock-label">Tictactoe</span>
      </a>
    </div>
<!-- main content -->
    <div class="px-6 py-8 md:mb-0 mb-7">
      <!-- 2-column layout -->
      <div
        class="flex flex-col lg:flex-row gap-6 px-6 py-8 max-w-7xl mx-auto lg:items-stretch"
      >
        <!-- left: hints + image stacked (shows above game on small, beside on large) -->
        <div class="flex flex-col gap-3  lg:w-52 lg:flex-shrink-0">
          <!-- hints panel -->
          <div class="bg-base-200 text-center rounded-xl p-4">
            <p class="font-semibold mb-3">You have only 3 Hints!</p>
            <div
              id="hintsList"
              class="flex flex-col gap-2 text-sm min-h-16 mb-3"
            >
              <p id="noHintsMsg" class="text-base-content/50 italic text-xs">
                No hints revealed yet
              </p>
            </div>
            <button id="revealHint" class="btn btn-sm btn-outline w-full">
              Reveal Hint
            </button>
          </div>

          <!-- silhouette panel -->
          <div
            class="bg-base-200 rounded-xl p-4 flex flex-col items-center gap-3 flex-1"
          >
            <p class="font-semibold">Pokémon</p>
            <div
              class="w-50 max-w-full mx-auto aspect-square bg-base-300 rounded-lg flex items-center justify-center overflow-hidden lg:w-full"
            >
              <img
                id="pokeSilhouette"
                src=""
                alt="Pokémon silhouette"
                class="w-full h-full object-contain silhouette"
              />
            </div>
            <p class="text-xs text-base-content/50 text-center">
              Guess to reveal!
            </p>
          </div>
        </div>

        <!-- right: game -->
        <div class="flex flex-col items-center gap-6 flex-1 min-w-0">
          <p class="text-base-content/60 text-sm">
            Guess the Pokémon Name in 6 tries
          </p>

          <!-- how to play box -->
          <div class="bg-base-200 rounded-xl p-4 w-full text-sm">
            <p class="font-semibold mb-2">How to play:</p>
            <div class="flex items-center gap-2 mb-1">
              <div class="w-6 h-6 rounded bg-success flex-shrink-0"></div>
              <span>Correct letter, correct position</span>
            </div>
            <div class="flex items-center gap-2 mb-1">
              <div class="w-6 h-6 rounded bg-warning flex-shrink-0"></div>
              <span>Correct letter, wrong position</span>
            </div>
            <div class="flex items-center gap-2">
              <div class="w-6 h-6 rounded bg-base-300 flex-shrink-0"></div>
              <span>Letter not in the word</span>
            </div>
          </div>

          <!-- 6x5 letter grid -->
          <div id="grid" class="flex flex-col gap-2 w-full">
            <!-- row 0 -->
            <div class="flex gap-2 guess w-full justify-center" data-row="0"></div>

            <!-- row 1 -->
            <div class="flex gap-2 guess w-full justify-center" data-row="1"></div>

            <!-- row 2 -->
            <div class="flex gap-2 guess w-full justify-center" data-row="2"></div>

            <!-- row 3 -->
            <div class="flex gap-2 guess w-full justify-center" data-row="3"></div>

            <!-- row 4 -->
            <div class="flex gap-2 guess w-full justify-center" data-row="4"></div>

            <!-- row 5 -->
            <div class="flex gap-2 guess w-full justify-center" data-row="5"></div>
          </div>

          <!-- invisible input - gives mobile a real text field to attach
               its on-screen keyboard to, so typed letters/backspace arrive
               as reliable "input" events instead of unreliable keydowns -->
          <input
            id="guessInput"
            type="text"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
            enterkeyhint="done"
            class="sr-only"
          />

          <!-- message area -->
          <div class="text-center font-semibold text-base hidden"></div>

          <!-- submit button -->
          <button id="submitGuess" class="btn btn-primary w-full">
            Submit Guess (Enter)
          </button>
        </div>
      </div>
    </div>

    <!-- modal -->
    <dialog id="my_modal_2" class="modal">
      <div class="modal-box flex flex-col justify-center items-center">
        <h3 id="messageTitle" class="text-lg font-bold"></h3>
        <img
          id="pokeReveal"
          src=""
          alt="Pokémon reveal"
          class="w-32 h-32 object-contain"
        />
        <p id="message" class="py-4"></p>
        <div class="modal-action w-full">
          <form method="dialog" class="flex gap-3 w-full">
            <button id="closeResult" class="btn btn-outline flex-1">
              Close
            </button>
            <button id="retryGame" class="btn btn-primary flex-1">
              Retry
            </button>
          </form>
        </div>
      </div>
      <form method="dialog" class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>

    <script src="js/wordle.js"></script>
  </body>
</html>
