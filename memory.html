<!doctype html>
<html id="page" lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poke Game</title>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link href="css/theme.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.js"></script>

    <style>
      .card {
        transition-property: transform;
        transition-duration: 0.5s;
        transform-style: preserve-3d;
        perspective: 1000px;
      }
      .flip {
        /* flips the whole card containing front and back */
        transform: rotateY(180deg);
      }
      .back {
        /* when card is flipped, this should be rotated as well to come into front and be visible */
        transform: rotateY(180deg);
        /* backface should be hidden because we dont wanna see it behing the logo */
        backface-visibility: hidden;
      }
      .front {
        /* visible unti flipped by rotation */
        backface-visibility: hidden;
      }
    </style>
  </head>
  <body>
    <!-- navbar -->
    <div class="sticky top-0 navbar bg-base-200 z-50 px-4 shadow-sm">
      <div class="navbar-start">
        <a href="index.html"
          ><img class="md:w-30 w-20" src="./images/logo.png" alt=""
        /></a>
      </div>
      <div class="navbar-center">
        <span class="md:text-xl text-lg font-bold">Poké Memory</span>
      </div>
      <div class="navbar-end">
        <label class="flex cursor-pointer gap-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 md:w-4 md:h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5" />
            <path
              d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"
            />
          </svg>
          <input type="checkbox" class="toggle theme-controller" />
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 md:w-4 md:h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </label>
      </div>
    </div>

    <!-- mobile nav -->
    <div class="dock fixed bottom-0 left-0 z-50 rounded-full md:hidden visible mb-2 bg-base-300">
      <a href="index.html">
        <svg class="size-8" viewBox="0 0 52 40" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="18" r="18" fill="#cc2222"/>
          <rect x="8" y="15" width="36" height="6" fill="#111111"/>
          <path d="M8 18 A18 18 0 0 0 44 18 Z" fill="#ffffff"/>
          <rect x="8" y="15" width="36" height="6" fill="#111111"/>
          <circle cx="26" cy="18" r="7" fill="#ffffff" stroke="#111111" stroke-width="2"/>
          <circle cx="26" cy="18" r="3" fill="#cc2222"/>
        </svg>
        <span class="dock-label">Home</span>
      </a>

      <a href="pokewordle.html">
        <svg class="size-8" viewBox="0 0 40 38" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="2" width="14" height="14" rx="2.5" fill="#44bb66"/>
          <rect x="22" y="2" width="14" height="14" rx="2.5" fill="#ddaa22"/>
          <rect x="4" y="20" width="14" height="14" rx="2.5" fill="#ddaa22"/>
          <rect x="22" y="20" width="14" height="14" rx="2.5" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
        </svg>
        <span class="dock-label">Wordle</span>
      </a>

      <a href="memory.html">
        <svg class="size-8" viewBox="0 0 34 36" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="6" width="20" height="26" rx="4" fill="#cc2222" opacity="0.15" stroke="#cc2222" stroke-width="1.5"/>
          <line x1="0" y1="19" x2="20" y2="19" stroke="#cc2222" stroke-width="1" opacity="0.5"/>
          <circle cx="10" cy="19" r="3.5" fill="white" stroke="#cc2222" stroke-width="1" opacity="0.7"/>
          <rect x="10" y="2" width="20" height="26" rx="4" fill="#cc2222" opacity="0.5" stroke="#cc2222" stroke-width="1.5"/>
          <line x1="10" y1="15" x2="30" y2="15" stroke="#ffffff" stroke-width="1" opacity="0.7"/>
          <circle cx="20" cy="15" r="3.5" fill="white" stroke="#ffffff" stroke-width="1" opacity="0.9"/>
        </svg>
        <span class="dock-label font-bold text-[#cc2222]">Memory</span>
        <span class="size-1.5 rounded-full bg-[#cc2222]"></span>
      </a>

      <a href="tictactoe.html">
        <svg class="size-8" viewBox="0 0 58 58" xmlns="http://www.w3.org/2000/svg">
          <rect x="18" y="0" width="2" height="58" fill="#111111"/>
          <rect x="38" y="0" width="2" height="58" fill="#111111"/>
          <rect x="0" y="18" width="58" height="2" fill="#111111"/>
          <rect x="0" y="38" width="58" height="2" fill="#111111"/>
          <circle cx="9" cy="9" r="6" fill="#cc2222"/>
          <rect x="3" y="7.5" width="12" height="3" fill="#111111"/>
          <path d="M3 9 A6 6 0 0 0 15 9 Z" fill="#ffffff"/>
          <rect x="3" y="7.5" width="12" height="3" fill="#111111"/>
          <circle cx="9" cy="9" r="2.5" fill="#ffffff" stroke="#111111" stroke-width="0.8"/>
          <circle cx="9" cy="9" r="1" fill="#cc2222"/>
          <circle cx="29" cy="29" r="6" fill="#cc2222"/>
          <rect x="23" y="27.5" width="12" height="3" fill="#111111"/>
          <path d="M23 29 A6 6 0 0 0 35 29 Z" fill="#ffffff"/>
          <rect x="23" y="27.5" width="12" height="3" fill="#111111"/>
          <circle cx="29" cy="29" r="2.5" fill="#ffffff" stroke="#111111" stroke-width="0.8"/>
          <circle cx="29" cy="29" r="1" fill="#cc2222"/>
          <circle cx="49" cy="49" r="6" fill="#cc2222"/>
          <rect x="43" y="47.5" width="12" height="3" fill="#111111"/>
          <path d="M43 49 A6 6 0 0 0 55 49 Z" fill="#ffffff"/>
          <rect x="43" y="47.5" width="12" height="3" fill="#111111"/>
          <circle cx="49" cy="49" r="2.5" fill="#ffffff" stroke="#111111" stroke-width="0.8"/>
          <circle cx="49" cy="49" r="1" fill="#cc2222"/>
        </svg>
        <span class="dock-label">Tictactoe</span>
      </a>
    </div>
    <!-- main content: difficulty picker, controls, live stats, and poke cards -->
    <div class="flex flex-col items-center gap-4 px-6 py-8">
      <div class="w-96 md:w-200 flex flex-col gap-3">
        <!-- container of difficulties -->
        <div class="bg-base-200 rounded-xl p-4 w-full text-center">
          <p class="text-sm text-base-content/60 mb-2">Choose a Difficulty</p>
          <div class="flex flex-row gap-2 justify-center">
            <button id="easy" class="btn btn-info flex-1">Easy</button>
            <button id="medium" class="btn btn-info flex-1">Medium</button>
            <button id="hard" class="btn btn-info flex-1">Hard</button>
          </div>
        </div>

        <!-- container of start and reset -->
        <div
          id="options"
          class="flex flex-row gap-2 items-center justify-center w-full hidden "
        ></div>

        <!-- container of info -->
        <div
          id="info"
          class="stats stats-vertical md:stats-horizontal shadow w-full hidden"
        >
          <div class="stat place-items-center">
            <div class="stat-title">Pairs to Win</div>
            <div class="stat-value text-xl"><span id="total"></span></div>
          </div>
          <div class="stat place-items-center">
            <div class="stat-title">Matched</div>
            <div class="stat-value text-xl"><span id="matched"></span></div>
          </div>
          <div class="stat place-items-center">
            <div class="stat-title">Pairs Left</div>
            <div class="stat-value text-xl"><span id="unmatched"></span></div>
          </div>
          <div class="stat place-items-center">
            <div class="stat-title">Clicks</div>
            <div class="stat-value text-xl"><span id="clicks"></span></div>
          </div>
          <div class="stat place-items-center">
            <div class="stat-title">Time Left / Limit</div>
            <div class="stat-value text-xl">
              <span id="easyTime"></span>/<span id="timeLimit"></span>s
            </div>
          </div>
        </div>
      </div>

      <!-- container of pokes -->
      <div id="pokeContainer"></div>
    </div>

    <!-- message modal -->
    <dialog id="my_modal" class="modal">
      <div class="modal-box flex flex-col justify-center items-center">
        <h3 id="messageTitle" class="text-lg font-bold"></h3>
      </div>
      <form method="dialog" class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>

    <!-- power-up banner - modal-top keeps it out of the cards' way, and it
         auto-closes after 1s in JS regardless of whether the player clicks
         the backdrop to dismiss it early -->
    <dialog id="powerUpModal" class="modal modal-top">
      <div class="modal-box w-fit bg-accent text-accent-content shadow-lg">
        <h3 class="text-lg font-bold text-center">Power Up!</h3>
      </div>
      <form method="dialog" class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>

    <script src="js/memory.js"></script>
  </body>
</html>
