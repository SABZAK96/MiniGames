<!doctype html>
<html id="page" lang="en" data-theme="light" >
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poke Game</title>
    
        <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      .card {
        transition-property: transform;
        transition-duration: 0.5s;
        transform-style: preserve-3d;
        perspective: 1000px;
      }
      .flip {
        /* flips the whole card containing front and back */
        transform: rotateY(180deg);
      }
      .back {
        /* when card is flipped, this should be rotated as well to come into front and be visible */
        transform: rotateY(180deg);
        /* backface should be hidden because we dont wanna see it behing the logo */
        backface-visibility: hidden;
      }
      .front {
        /* visible unti flipped by rotation */
        backface-visibility: hidden;
      }
    </style>
  </head>
  <body>
    <!-- navbar -->
    <div class="navbar bg-[#FFF8E7] px-4 shadow-sm">
      <div class="navbar-start">
        <a href="home.html"><img class="w-30" src="./images/logo.png" alt="" /></a>
      </div>
      <div class="navbar-center">
        <span class="text-xl font-bold">Poké Games</span>
      </div>
      <div class="navbar-end">
        <label class="flex cursor-pointer gap-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5" />
            <path
              d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"
            />
          </svg>
          <input type="checkbox" class="toggle theme-controller" />
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </label>
      </div>
    </div>
    <!-- container of difficulties -->
    <div class="flex flex-row gap-1 items-center justify-center pt-5">
      <button id="easy" class="btn btn-info">Easy</button>
      <button id="medium" class="btn btn-info">Medium</button>
      <button id="hard" class="btn btn-info">Hard</button>
    </div>
    <!-- container of start and reset -->
    <div
      id="options"
      class="flex flex-row gap-1 items-center justify-center pt-2 mb-3 hidden"
    ></div>
    <!-- container of info -->
    <div id="info" class="mx-auto overflow-x-auto mb-3 hidden">
      <table class="table text-center mx-auto">
        <!-- head -->

        <tbody>
          <!-- row 1 -->
          <tr>
            <td class="font-bold text-xl">
              Total Number of Matched Pairs to win: <span id="total"></span>
            </td>
          </tr>
          <!-- row 2 -->
          <tr>
            <td class="font-bold text-xl">
              Number of Matches: <span id="matched"></span>
            </td>
          </tr>
          <!-- row 3 -->
          <tr>
            <td class="font-bold text-xl">
              Number of pair left: <span id="unmatched"></span>
            </td>
          </tr>
          <!-- row 4 -->
          <tr>
            <td class="font-bold text-xl">
              Number of Clicks: <span id="clicks"></span>
            </td>
          </tr>
          <!-- row 5 -->
          <tr>
            <td class="font-bold text-xl">
              You got <span id="timeLimit"></span> seconds.<span
                >Remaining Time: <span id="easyTime"></span
              ></span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
 
    <!-- container of pokes -->
    <div id="pokeContainer"></div>
    <script src="code.js"></script>
  </body>
</html>
