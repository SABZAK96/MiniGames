<!doctype html>
<html id="page" lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poke Game</title>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link href="css/theme.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.js"></script>
    <script
      src="https://cdn.socket.io/4.8.1/socket.io.min.js"
      integrity="sha384-mkQ3/7FUtcGyoppY6bz/PORYoGqOl7/aSUMn2ymDOJcapfS6PHqxhRTMh1RR0Q6+"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- navbar -->
    <div class="navbar bg-base-200 px-4 shadow-sm">
      <div class="navbar-start">
        <a href="index.html"
          ><img class="md:w-30 w-20" src="./images/logo.png" alt=""
        /></a>
      </div>
      <div class="navbar-center">
        <span class="md:text-xl text-lg font-bold">Poké TicTacToe</span>
      </div>
      <div class="navbar-end">
        <label class="flex cursor-pointer gap-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 md:w-4 md:h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5" />
            <path
              d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"
            />
          </svg>
          <input type="checkbox" class="toggle theme-controller" />
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 md:w-4 md:h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </label>
      </div>
    </div>

    <!-- mobile nav -->
    <div class="dock fixed bottom-0 left-0 z-50 rounded-full md:hidden visible mb-2 bg-base-200">
      <a href="index.html">
        <svg class="size-8" viewBox="0 0 52 40" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="18" r="18" fill="#cc2222"/>
          <rect x="8" y="15" width="36" height="6" fill="#111111"/>
          <path d="M8 18 A18 18 0 0 0 44 18 Z" fill="#ffffff"/>
          <rect x="8" y="15" width="36" height="6" fill="#111111"/>
          <circle cx="26" cy="18" r="7" fill="#ffffff" stroke="#111111" stroke-width="2"/>
          <circle cx="26" cy="18" r="3" fill="#cc2222"/>
        </svg>
        <span class="dock-label">Home</span>
      </a>

      <a href="pokewordle.html">
        <svg class="size-8" viewBox="0 0 40 38" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="2" width="14" height="14" rx="2.5" fill="#44bb66"/>
          <rect x="22" y="2" width="14" height="14" rx="2.5" fill="#ddaa22"/>
          <rect x="4" y="20" width="14" height="14" rx="2.5" fill="#ddaa22"/>
          <rect x="22" y="20" width="14" height="14" rx="2.5" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
        </svg>
        <span class="dock-label">Wordle</span>
      </a>

      <a href="memory.html">
        <svg class="size-8" viewBox="0 0 34 36" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="6" width="20" height="26" rx="4" fill="#cc2222" opacity="0.15" stroke="#cc2222" stroke-width="1.5"/>
          <line x1="0" y1="19" x2="20" y2="19" stroke="#cc2222" stroke-width="1" opacity="0.5"/>
          <circle cx="10" cy="19" r="3.5" fill="white" stroke="#cc2222" stroke-width="1" opacity="0.7"/>
          <rect x="10" y="2" width="20" height="26" rx="4" fill="#cc2222" opacity="0.5" stroke="#cc2222" stroke-width="1.5"/>
          <line x1="10" y1="15" x2="30" y2="15" stroke="#ffffff" stroke-width="1" opacity="0.7"/>
          <circle cx="20" cy="15" r="3.5" fill="white" stroke="#ffffff" stroke-width="1" opacity="0.9"/>
        </svg>
        <span class="dock-label">Memory</span>
      </a>

      <a href="tictactoe.html">
        <svg class="size-8" viewBox="0 0 58 58" xmlns="http://www.w3.org/2000/svg">
          <rect x="18" y="0" width="2" height="58" fill="#111111"/>
          <rect x="38" y="0" width="2" height="58" fill="#111111"/>
          <rect x="0" y="18" width="58" height="2" fill="#111111"/>
          <rect x="0" y="38" width="58" height="2" fill="#111111"/>
          <circle cx="9" cy="9" r="6" fill="#cc2222"/>
          <rect x="3" y="7.5" width="12" height="3" fill="#111111"/>
          <path d="M3 9 A6 6 0 0 0 15 9 Z" fill="#ffffff"/>
          <rect x="3" y="7.5" width="12" height="3" fill="#111111"/>
          <circle cx="9" cy="9" r="2.5" fill="#ffffff" stroke="#111111" stroke-width="0.8"/>
          <circle cx="9" cy="9" r="1" fill="#cc2222"/>
          <circle cx="29" cy="29" r="6" fill="#cc2222"/>
          <rect x="23" y="27.5" width="12" height="3" fill="#111111"/>
          <path d="M23 29 A6 6 0 0 0 35 29 Z" fill="#ffffff"/>
          <rect x="23" y="27.5" width="12" height="3" fill="#111111"/>
          <circle cx="29" cy="29" r="2.5" fill="#ffffff" stroke="#111111" stroke-width="0.8"/>
          <circle cx="29" cy="29" r="1" fill="#cc2222"/>
          <circle cx="49" cy="49" r="6" fill="#cc2222"/>
          <rect x="43" y="47.5" width="12" height="3" fill="#111111"/>
          <path d="M43 49 A6 6 0 0 0 55 49 Z" fill="#ffffff"/>
          <rect x="43" y="47.5" width="12" height="3" fill="#111111"/>
          <circle cx="49" cy="49" r="2.5" fill="#ffffff" stroke="#111111" stroke-width="0.8"/>
          <circle cx="49" cy="49" r="1" fill="#cc2222"/>
        </svg>
        <span class="dock-label font-bold text-[#cc2222]">Tictactoe</span>
        <span class="size-1.5 rounded-full bg-[#cc2222]"></span>
      </a>
    </div>

    <!-- main content -->
    <div class="flex flex-col items-center gap-4 px-6 py-8">
      <!-- let user find their own poke -->
      <!-- You can open the modal using ID.showModal() method -->
      <dialog id="my_modal_4" class="modal">
        <div class="modal-box w-11/12 max-w-5xl">
          <div id="modeBox">
            <h3 id="chooseMode" class="text-lg font-bold">
              Choose who you want to play with!
            </h3>
            <div class="flex flex-row gap-1 mt-4">
              <div
                id="ai"
                class="mode card bg-base-100 flex-1 justify-center items-center shadow-sm"
              >
                <div class="card-body">
                  <h2 class="card-title text-sm md:text-xl">AI</h2>
                </div>
              </div>

              <div
                id="local"
                class="mode card bg-base-100 flex-1 justify-center items-center shadow-sm"
              >
                <div class="card-body">
                  <h2 class="card-title text-sm md:text-xl">Local</h2>
                </div>
              </div>

              <div
                id="online"
                class="mode card bg-base-100 flex-1 justify-center items-center shadow-sm"
              >
                <div class="card-body">
                  <h2 class="card-title text-sm md:text-xl">Online</h2>
                </div>
              </div>
            </div>
          </div>

          <div id="onlineRooms" class="flex flex-row gap-1 mt-4 hidden">
            <div
              id="joinRandom"
              class="card bg-base-100 flex-1 justify-center items-center shadow-sm"
            >
              <div class="card-body">
                <h2 class="card-title text-sm md:text-xl">Join a Random Room</h2>
              </div>
            </div>
            <div
              id="joinID"
              class="card bg-base-100 flex-1 justify-center items-center shadow-sm"
            >
              <div class="card-body flex flex-col">
                <h2 class="card-title text-sm md:text-xl">Join with a Room ID</h2>
                <input
                  id="roomID"
                  type="text"
                  class="hidden text-black rounded bg-white"
                />
              </div>
            </div>
          </div>

          <h3 class="text-lg font-bold mt-4">Pick Your Poke Marker!</h3>
          <form method="dialog" class="flex flex-col gap-3 mt-4">
            <input
              type="text"
              id="name"
              placeholder="Your Name..."
              class="input w-full"
            />
            <input
              id="search"
              type="text"
              placeholder="Search for your poke..."
              class="input w-full"
            />
            <div id="pokePreview"></div>
            <p id="onlineError" class="text-red-500 font-bold hidden"></p>
            <!-- modal action is for placing buttons on the bottom right so i brought the form out of it to have a full width search bar -->
            <div class="modal-action mt-0">
              <button type="submit" class="btn btn-error btn-outline">
                Cancel
              </button>
              <button id="select" type="button" class="btn btn-primary">
                Confirm
              </button>
            </div>
          </form>
        </div>
      </dialog>
      <!-- another modal for selection confirmation -->
      <dialog id="my_modal_5" class="modal">
        <div class="modal-box w-11/12 max-w-5xl">
          <form
            method="dialog"
            class="flex flex-col justify-center items-center gap-3 mt-4"
          >
            <div class="font-bold text-base">You selected</div>
            <div
              id="pokeName"
              class="italic text-primary text-xl font-bold"
            ></div>
            <div><img id="pokePic" src="" class="w-75 h-75" /></div>
            <!-- modal action is for placing buttons on the bottom right so i brought the form out of it to have a full width search bar -->
            <div class="modal-action mt-0">
              <button id="startGame" class="btn btn-primary">Let's Go!</button>
            </div>
          </form>
        </div>
      </dialog>

      <!-- different modal for online play -->
      <dialog id="my_modal_6" class="modal">
        <div class="modal-box w-11/12 max-w-5xl">
          <form
            method="dialog"
            class="flex flex-col justify-center items-center gap-3 mt-4"
          >
            <div class="font-bold text-base">You selected</div>
            <div
              id="pokeNameSelf"
              class="italic text-primary text-xl font-bold"
            ></div>
            <div><img id="pokePicSelf" src="" class="w-75 h-75" /></div>

            <p id="roomStatus" class="font-bold mt-2 hidden"></p>

            <p class="font-bold">
              Room ID: <span id="roomNumber" class="mt-2 hidden"></span>
            </p>

            <div class="font-bold text-base">Your Opponent</div>
            <div
              id="OpponentName"
              class="italic text-primary text-xl font-bold"
            ></div>
            <div>
              <img
                id="pokePicOpponent"
                src="./images/qm1.png"
                class="w-75 h-75 object-cover"
              />
            </div>

            <!-- modal action is for placing buttons on the bottom right so i brought the form out of it to have a full width search bar -->
            <div class="modal-action mt-0">
              <button id="startGameOnline" class="btn btn-primary">
                Let's Go!
              </button>
            </div>
          </form>
        </div>
      </dialog>

      <!-- another modal for selection confirmation with ai -->
      <dialog id="my_modal_ai" class="modal">
        <div class="modal-box w-11/12 max-w-5xl">
          <form
            method="dialog"
            class="flex flex-col justify-center items-center gap-3 mt-4"
          >
            <div class="font-bold text-base">You selected</div>
            <div
              id="pokeNameAi"
              class="italic text-primary text-xl font-bold"
            ></div>
            <div><img id="pokePicAi" src="" class="w-75 h-75" /></div>
            <!-- modal action is for placing buttons on the bottom right so i brought the form out of it to have a full width search bar -->
            <div class="modal-action mt-0">
              <button id="startGameAi" class="btn btn-primary">
                Let's Go!
              </button>
            </div>
          </form>
        </div>
      </dialog>

      <!-- controls above grid: same width as grid -->
      <div class="w-full max-w-96 md:w-200 flex flex-col gap-3">
        <!-- turn indicator -->
        <div class="bg-base-200 rounded-xl p-4 w-full text-center">
          <p class="text-sm text-base-content/60 mb-1">Current Turn</p>
          <p id="currentTurn" class="text-xl font-bold"></p>
        </div>

        <!-- win stats -->
        <div class="flex gap-3 w-full">
          <div class="bg-base-200 rounded-xl p-4 flex-1 text-center">
            <p class="text-sm text-base-content/60">
              <span id="p1Name"></span> Wins
            </p>
            <p id="p1wins" class="text-2xl font-bold">0</p>
          </div>
          <div class="bg-base-200 rounded-xl p-4 flex-1 text-center">
            <p class="text-sm text-base-content/60">
              <span id="p2Name"></span> Wins
            </p>
            <p id="p2wins" class="text-2xl font-bold">0</p>
          </div>
        </div>

        <!-- round / game controls -->
        <div class="flex gap-2 w-full">
          <button id="newRound" class="btn btn-outline flex-1">
            New Round
          </button>
          <button id="newGame" class="btn btn-error btn-outline flex-1">
            New Game
          </button>
        </div>
      </div>

      <!-- tictactoe grid -->
      <div
        id="gameGrid"
        class="w-full max-w-96 aspect-square md:w-200 md:h-200 flex flex-row hover:cursor-pointer md:pt-10 mb-11 md:mb-0"
      >
        <!-- first col -->
        <div class="flex flex-col w-1/3 h-full">
          <div
            class="h-1/3 w-full border-r-2 border-b-2 border-base-content"
            data-row="0"
            data-col="0"
          ></div>
          <div
            class="h-1/3 w-full border-r-2 border-b-2 border-base-content"
            data-row="1"
            data-col="0"
          ></div>
          <div
            class="h-1/3 w-full border-r-2 border-base-content"
            data-row="2"
            data-col="0"
          ></div>
        </div>
        <!-- second col -->
        <div class="flex flex-col w-1/3 h-full">
          <div
            class="h-1/3 w-full border-r-2 border-b-2 border-base-content"
            data-row="0"
            data-col="1"
          ></div>
          <div
            class="h-1/3 w-full border-r-2 border-b-2 border-base-content"
            data-row="1"
            data-col="1"
          ></div>
          <div
            class="h-1/3 w-full border-r-2 border-base-content"
            data-row="2"
            data-col="1"
          ></div>
        </div>
        <!-- third col -->
        <div class="flex flex-col w-1/3 h-full">
          <div
            class="h-1/3 w-full border-b-2 border-base-content"
            data-row="0"
            data-col="2"
          ></div>
          <div
            class="h-1/3 w-full border-b-2 border-base-content"
            data-row="1"
            data-col="2"
          ></div>
          <div class="h-1/3 w-full" data-row="2" data-col="2"></div>
        </div>
      </div>
    </div>

    <!-- win modal -->
    <dialog id="my_modal_win" class="modal">
      <div class="modal-box flex flex-col justify-center items-center gap-3">
        <h3 id="messageTitle" class="text-lg font-bold"></h3>
        <button id="findMatch" type="button" class="btn btn-primary hidden">
          Find New Match
        </button>
      </div>
      <form method="dialog" class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>

    <!-- request a rematch request modal -->
    <dialog id="my_modal_rematch" class="modal">
      <div class="modal-box flex flex-col justify-center items-center gap-3">
        <h3 id="requester" class="text-lg font-bold"></h3>
        <div class="flex flex-row gap-2">
          <button
            id="accept"
            type="button"
            class="btn btn-primary flex-1"
          >
            Accept
          </button>
          <button
            id="reject"
            type="button"
            class="btn btn-primary flex-1"
          >
            Reject
          </button>
        </div>
      </div>
      <form method="dialog" class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>
    <!-- modal for waiting -->
    <dialog id="my_modal_waiting" class="modal">
      <div class="modal-box flex flex-col justify-center items-center gap-3">
        <h3 id="waitMessage" class="text-lg font-bold text-center"></h3>
      </div>
    </dialog>
    <script src="js/tictactoe.js"></script>
  </body>
</html>
