<!doctype html>
<html id="page" lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poke Game</title>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <!-- navbar -->
    <div class="navbar bg-base-200 px-4 shadow-sm">
      <div class="navbar-start">
        <a href="/index.html" class="btn btn-ghost">← Games</a>
      </div>
      <div class="navbar-center">
        <span class="text-xl font-bold">Poké TicTacToe</span>
      </div>
      <div class="navbar-end">
        <label class="flex cursor-pointer gap-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5" />
            <path
              d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"
            />
          </svg>
          <input type="checkbox" class="toggle theme-controller" />
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </label>
      </div>
    </div>

    <!-- main content -->
    <div class="flex flex-col items-center gap-4 px-6 py-8">
      <!-- let user find their own poke -->
      <!-- You can open the modal using ID.showModal() method -->
      <button class="btn" onclick="my_modal_4.showModal()">open modal</button>
      <dialog id="my_modal_4" class="modal">
        <div class="modal-box w-11/12 max-w-5xl">
          <h3 class="text-lg font-bold">Pick Your Poke Marker!</h3>
          <form method="dialog" class="flex flex-col gap-3 mt-4">
            <input type="text" placeholder="Search for your poke..." class="input w-full" />
            <div id="pokePreview"></div>
            <div class="modal-action mt-0">
              <button class="btn btn-primary">Confirm</button>
            </div>
          </form>
        </div>
      </dialog>
      <!-- controls above grid: same width as grid -->
      <div class="w-96 md:w-200 flex flex-col gap-3">
        <!-- turn indicator -->
        <div class="bg-base-200 rounded-xl p-4 w-full text-center">
          <p class="text-sm text-base-content/60 mb-1">Current Turn</p>
          <p id="currentTurn" class="text-xl font-bold">Player 1</p>
        </div>

        <!-- win stats -->
        <div class="flex gap-3 w-full">
          <div class="bg-base-200 rounded-xl p-4 flex-1 text-center">
            <p class="text-sm text-base-content/60">Player 1 Wins</p>
            <p id="p1wins" class="text-2xl font-bold">0</p>
          </div>
          <div class="bg-base-200 rounded-xl p-4 flex-1 text-center">
            <p class="text-sm text-base-content/60">Player 2 Wins</p>
            <p id="p2wins" class="text-2xl font-bold">0</p>
          </div>
        </div>

        <!-- reset -->
        <button id="resetGame" class="btn btn-outline w-full">
          Reset Game
        </button>
      </div>

      <!-- tictactoe grid -->
      <div class="w-96 h-96 md:w-200 md:h-200 flex flex-row">
        <!-- first col -->
        <div class="flex flex-col w-1/3 h-full">
          <div
            class="h-1/3 w-full border-r-2 border-b-2 border-base-content"
            data-row="0"
            data-col="0"
          ></div>
          <div
            class="h-1/3 w-full border-r-2 border-b-2 border-base-content"
            data-row="1"
            data-col="0"
          ></div>
          <div
            class="h-1/3 w-full border-r-2 border-base-content"
            data-row="2"
            data-col="0"
          ></div>
        </div>
        <!-- second col -->
        <div class="flex flex-col w-1/3 h-full">
          <div
            class="h-1/3 w-full border-r-2 border-b-2 border-base-content"
            data-row="0"
            data-col="1"
          ></div>
          <div
            class="h-1/3 w-full border-r-2 border-b-2 border-base-content"
            data-row="1"
            data-col="1"
          ></div>
          <div
            class="h-1/3 w-full border-r-2 border-base-content"
            data-row="2"
            data-col="1"
          ></div>
        </div>
        <!-- third col -->
        <div class="flex flex-col w-1/3 h-full">
          <div
            class="h-1/3 w-full border-b-2 border-base-content"
            data-row="0"
            data-col="2"
          ></div>
          <div
            class="h-1/3 w-full border-b-2 border-base-content"
            data-row="1"
            data-col="2"
          ></div>
          <div class="h-1/3 w-full" data-row="2" data-col="2"></div>
        </div>
      </div>
    </div>
  </body>
</html>
